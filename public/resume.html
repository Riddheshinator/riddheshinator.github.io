<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Placeholder</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #090b0f;
        color: #d9e6ef;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        border: 1px solid #26303b;
        border-radius: 8px;
        background: #11161d;
        padding: 32px;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.28);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
      }

      p {
        margin-top: 16px;
        color: #9fb0c2;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Resume Placeholder</h1>
      <p>
        Replace this file with your real resume PDF or update the Resume links in
        <strong>src/App.jsx</strong>.
      </p>
    </main>
  </body>
</html>
